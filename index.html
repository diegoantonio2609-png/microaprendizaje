<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retroalimentación Docentes</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', Helvetica, Arial, sans-serif;
            color: #1a1a1a;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
        }

        .main-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 48px;
            box-sizing: border-box;
            background-color: #ffffff;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            max-width: 900px;
            margin: 0 auto 64px auto;
        }

        .header-badge {
            display: inline-block;
            padding: 6px 16px;
            background-color: rgba(171, 30, 18, 0.08);
            color: #AB1E12;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.1em;
            border-radius: 50px;
        }

        .header-title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .header h1 {
            margin: 0;
            font-size: 40px;
            font-weight: 800;
            color: #1a1a1a;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .header p {
            margin: 0 auto;
            font-size: 18px;
            font-weight: 400;
            color: #4a4a4a;
            line-height: 1.8;
            max-width: 680px;
        }

        .iframe-container {
            background-color: #fafafa;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.02);
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            height: 800px; /* Adjust as needed */
            box-sizing: border-box;
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 20px;
            background-color: #ffffff;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.04);
        }

        .footer {
            text-align: center;
            margin-top: 64px;
            padding-top: 32px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }

        .footer p {
            margin: 0;
            font-size: 14px;
            color: #888888;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .main-container {
                padding: 48px 24px;
            }
            .header h1 {
                font-size: 32px;
            }
            .header-title-container {
                flex-direction: column;
            }
            .iframe-container {
                padding: 16px;
                height: 700px;
                border-radius: 24px;
            }
            .iframe-container iframe {
                border-radius: 16px;
            }
        }
    </style>
</head>
<body>

<div class="main-container">
    <header class="header">
        <div class="header-title-container">
            <span class="header-badge">HERRAMIENTA</span>
            <h1>Retroalimentación con IA</h1>
        </div>
        <p>Interactúa con nuestro asistente pedagógico para refinar tu objetivo, gancho, contenido y acción. Diseñado para acompañarte en la creación de experiencias de microaprendizaje sólidas.</p>
    </header>

    <main>
        <div class="iframe-container">
            <iframe
                src="https://ditorress-retroalimentacion-docentes.hf.space?__theme=light"
                title="Asistente de Retroalimentación Pedagógica"
                frameborder="0"
                width="850"
                height="450">
            </iframe>
        </div>
    </main>

    <footer class="footer">
        <p>Proyecto de Microaprendizaje · Diseño Instruccional</p>
    </footer>
</div>

</body>
</html>
